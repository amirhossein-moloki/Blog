openapi: 3.0.3
info:
  title: Blog Platform API
  version: 1.0.0
  description: API for managing posts, medias, interactions, pages, navigation and
    users.
paths:
  /api/interactions/comments/:
    get:
      operationId: interactions_comments_list
      parameters:
      - name: page
        required: false
        in: query
        description: یک شماره صفحه‌ در مجموعه نتایج صفحه‌بندی شده.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: تعداد نتایج برای نمایش در هر صفحه.
        schema:
          type: integer
      tags:
      - interactions
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCommentList'
          description: ''
    post:
      operationId: interactions_comments_create
      tags:
      - interactions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Comment'
          application/x-www-form-urlencoded:
