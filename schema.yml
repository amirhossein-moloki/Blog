components:
  schemas:
    AuthorForPost:
      type: object
      properties:
        display_name:
          type: string
          maxLength: 255
        avatar:
          allOf:
          - $ref: '#/components/schemas/MediaDetail'
          readOnly: true
      required:
      - avatar
      - display_name
    AuthorProfile:
      type: object
      properties:
        user:
          type: integer
        display_name:
          type: string
          maxLength: 255
        bio:
          type: string
        avatar:
          type: integer
          nullable: true
      required:
      - display_name
      - user
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          pattern: ^[-\w]+$
          maxLength: 50
        name:
          type: string
          maxLength: 255
        parent:
          type: integer
          nullable: true
      required:
      - id
      - name
      - slug
    Comment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        post:
          type: integer
        user:
          type: integer
          readOnly: true
        parent:
          type: integer
          nullable: true
        content:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: زمان ایجاد رکورد.
        status:
          $ref: '#/components/schemas/CommentStatusEnum'
      required:
      - content
      - created_at
      - id
      - post
      - user
    CommentList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/CommentUser'
          readOnly: true
        content:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: زمان ایجاد رکورد.
        parent:
          type: integer
          nullable: true
        likes_count:
          type: integer
          readOnly: true
      required:
      - content
      - created_at
      - id
      - likes_count
      - user
    CommentStatusEnum:
      enum:
      - pending
      - approved
      - spam
      - removed
      type: string
      description: |-
        * `pending` - Pending
        * `approved` - Approved
        * `spam` - Spam
        * `removed` - Removed
    CommentUser:
      type: object
      properties:
        username:
          type: string
          title: نام کاربری
          description: الزامی. 150 کاراکتر یا کمتر. فقط شامل حروف، اعداد، و علامات
            @/./+/-/_
          pattern: ^[\w.@+-]+$
          maxLength: 150
        profile_picture:
          type: string
          format: uri
          nullable: true
      required:
      - username
    CustomTokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    GoogleLogin:
      type: object
      properties:
        id_token:
          type: string
      required:
      - id_token
    LocationEnum:
      enum:
      - header
      - footer
      - sidebar
      type: string
      description: |-
        * `header` - Header
        * `footer` - Footer
        * `sidebar` - Sidebar
    MediaCreate:
      type: object
      properties:
        file:
          type: string
          format: uri
          writeOnly: true
        alt_text:
          type: string
          maxLength: 255
        title:
          type: string
          maxLength: 255
      required:
      - file
    MediaDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        storage_key:
          type: string
          maxLength: 255
        url:
          type: string
          format: uri
          maxLength: 200
        type:
          type: string
          maxLength: 50
        mime:
          type: string
          maxLength: 100
        width:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        height:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        duration:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          nullable: true
        size_bytes:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        alt_text:
          type: string
          maxLength: 255
        title:
          type: string
          maxLength: 255
        uploaded_by:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
